  label_help: "Help"
  label_help_toolbar_icons: "1. Header Menu Icons"
  help_desc_maximize_left: "Expands the task list to fill the screen, hiding the chart. Click again to restore the split view."
  help_desc_maximize_right: "Expands the Gantt chart to fill the screen, hiding the task list. Click again to restore the split view."
  help_desc_issue_new: "Opens a dialog to create a new issue."
  help_desc_filter_tasks: "Filter the visible tasks by matching the issue subject. Shortcut: Ctrl+F."
  help_desc_columns: "Select which columns are visible in the left task list."
  help_desc_assignee_filter: "Filter tasks by specific assignees, or group tasks by their assignee."
  help_desc_project_filter: "Filter tasks by project, or group tasks by their parent project."
  help_desc_version_filter: "Filter tasks by target version, or toggle the visibility of version group headers."
  help_desc_status_filter: "Filter tasks by their current issue status (e.g., New, In Progress, Closed)."
  help_desc_progress_line: "Toggle the visibility of a progress line on the chart to visualize if tasks are ahead or behind schedule."
  help_desc_dependency_settings: "Configure default dependency behavior, including relation type, auto-calculated delay, and how linked tasks move during auto scheduling."
  help_desc_export: "Export the current Gantt view as a PNG image, or download the visible task data as CSV including hierarchy and dependency columns."
  help_desc_organize_by_dependency: "Sort tasks based on their dependencies. Preceding tasks will be listed before succeeding tasks."
  help_desc_points_orphans: "Show or hide milestone indicators for tasks that only have a start date or a due date."
  help_desc_today: "Scrolls the timeline view to center on the current day."
  help_label_zoom: "Zoom Levels (Month, Week, Day)"
  help_desc_zoom: "Adjust the timescale of the Gantt chart. Month view for high-level planning, Day view for details."
  help_desc_row_height: "Change the vertical size of task rows."
  help_label_fullscreen: "Full Screen"
  help_desc_fullscreen: "Toggle full screen mode to maximize your workspace."
  help_label_autosave: "Auto Save"
  help_desc_autosave: "When enabled, changes (like dragging tasks) are saved immediately. When disabled, you must manually click Save."
  help_label_basic_operations: "2. Basic Operations"
  help_op_drag_drop: "Drag & Drop"
  help_op_drag_drop_desc: "Drag a task bar in the chart to change its start and due dates. Drag the edges of a bar to change its duration."
  help_op_dependency: "Draw Dependencies"
  help_op_dependency_desc: "Hover over a task bar to see connection points. Click and drag from a point to another task to create a dependency relation."
  help_op_inline_edit: "Inline Editing"
  help_op_inline_edit_desc: "Double-click or press Enter on a cell in the left task list to quickly edit its value without opening the full issue page."
  help_op_context_menu: "Context Menu"
  help_op_context_menu_desc: "Right-click on a task row or task bar to access a context menu for editing, assigning, updating status, or opening the issue."
  help_op_unscheduled: "Schedule Tasks"
  help_op_unscheduled_desc: "For tasks without dates, edit the start date or due date directly in the left task list. Once dates are set, the task will also appear on the chart."
