  label_help: "ヘルプ"
  label_help_toolbar_icons: "1. ヘッダメニューのアイコン"
  help_desc_maximize_left: "チャートを隠してタスク一覧を画面いっぱいに広げます。もう一度クリックすると元の分割ビューに戻ります。"
  help_desc_maximize_right: "タスク一覧を隠してガントチャートを画面いっぱいに広げます。もう一度クリックすると元の分割ビューに戻ります。"
  help_desc_issue_new: "画面を移動せずに、新しいチケットを作成するためのダイアログを開きます。"
  help_desc_filter_tasks: "チケットの題名に含まれるキーワードでタスクを素早く絞り込みます。ショートカットキー: Ctrl+F"
  help_desc_columns: "左側のタスク一覧に表示する列（ステータス、担当者、開始日、期日など）を選択します。"
  help_desc_assignee_filter: "特定の担当者でタスクを絞り込んだり、担当者ごとにタスクをグループ化して表示します。"
  help_desc_project_filter: "特定のプロジェクトでタスクを絞り込んだり、プロジェクトごとにタスクをグループ化して表示します。"
  help_desc_version_filter: "対象バージョンでタスクを絞り込んだり、バージョンの見出し行の表示/非表示を切り替えます。"
  help_desc_status_filter: "現在のステータス（新規、進行中、終了など）でタスクを絞り込みます。"
  help_desc_progress_line: "チャート上にイナズマ線を表示・非表示にし、タスクが予定より進んでいるか遅れているかを視覚化します。"
  help_desc_dependency_settings: "依存関係のデフォルト動作を設定します。関係種別、delay の自動計算、自動スケジュール時の連動タスク移動モードを切り替えられます。"
  help_desc_export: "現在のガント表示を PNG 画像として出力したり、表示中のタスクデータを親子関係列・依存関係列付きの CSV としてダウンロードしたりできます。"
  help_desc_organize_by_dependency: "依存関係に基づいてタスクを並べ替えます。先行するタスクが後続するタスクより前に表示されます。"
  help_desc_points_orphans: "開始日のみ、または期日のみが設定されているタスクのマイルストーン（点）の表示/非表示を切り替えます。"
  help_desc_today: "タイムラインを現在の日付が中央にくるようにスクロールします。"
  help_label_zoom: "ズームレベル (月、週、日)"
  help_desc_zoom: "ガントチャートの時間軸を調整します。大まかな計画には月表示、詳細な確認には日表示を使用します。"
  help_desc_row_height: "タスク行の縦幅を変更し、画面に表示するタスク数を増やしたり見やすくしたりします。"
  help_label_fullscreen: "全画面表示"
  help_desc_fullscreen: "ワークスペースを最大化するために全画面表示を切り替えます。"
  help_label_autosave: "自動保存"
  help_desc_autosave: "有効な場合、タスクの移動などの変更は即座に保存されます。無効な場合、手動で「保存」ボタンをクリックする必要があります。"
  help_label_basic_operations: "2. 基本操作"
  help_op_drag_drop: "ドラッグ＆ドロップ"
  help_op_drag_drop_desc: "チャート上のタスクバーをドラッグして開始日と期日を変更します。バーの端をドラッグすると期間を変更できます。"
  help_op_dependency: "依存関係を描く"
  help_op_dependency_desc: "タスクバーにカーソルを合わせると接続点が表示されます。あるタスクの点から別のタスクへドラッグ＆ドロップして依存関係を作成します。"
  help_op_inline_edit: "インライン編集"
  help_op_inline_edit_desc: "左側のタスク一覧のセルをダブルクリックするかEnterキーを押すと、チケット画面を開かずに値を素早く編集できます。"
  help_op_context_menu: "コンテキストメニュー"
  help_op_context_menu_desc: "タスクの行やバーを右クリックすると、編集、担当者やステータスの変更、チケットを開くためのメニューが表示されます。"
  help_op_unscheduled: "タスクのスケジュール設定"
  help_op_unscheduled_desc: "日付が未設定のタスクは左側の一覧で開始日または期日を直接編集してスケジュールできます。日付を設定するとチャート上にも表示されます。"
